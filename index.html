<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atrapa Limones</title>
  <link rel="stylesheet" href="lemons.css">
</head>

<body>
  <div class="contenedor">
    <h1>🍋 Atrapar Limones</h1>
    <h2>Autor: LopSig Dev</h2>

    <div class="instrucciones">
      <h3>¿Cómo jugar?</h3>
      <p>
        <strong>Pulsa "Iniciar Juego" para comenzar</strong><br>
        Atrapa 7 limones para ganar el juego<br>
        Usa ⬅ ➡ para moverte<br>
        Pierdes una vida si el limón llega al suelo<br>
        Puedes reiniciar o detener el juego en cualquier momento
      </p>
    </div>

    <div class="botones">
      <button onclick="start()">▶ Iniciar Juego</button>
    </div>

    <canvas id="gameArea" width="600" height="400"></canvas>

    <div class="panel">
      <p>🍋 Puntaje: <span id="txtScore">0</span></p>
      <p>❤️ Vidas: <span id="txtLife">3</span></p>
    </div>

    <div class="botones">
      <button onclick="moveLeft()">⬅</button>
      <button onclick="moveRight()">➡</button>
    </div>

    <div class="botones">
      <button onclick="restart()">🔄 Reiniciar</button>
      <button onclick="stopGame()">⏹ Detener</button>
    </div>

    <p id="mensaje"></p>
  </div>

  <script src="lemons.js"></script>
  <script src="utils.js"></script>
</body>

</html>
